<div class="card w-full h-full">
  <div class="overflow-y-auto max-h-[185px]">
  <div class="flex items-center mb-4">
     <div
      class="cursor-pointer flex items-center justify-center bg-indigo-100/30 dark:bg-indigo-400/10 rounded-full w-8 h-8 shrink-0 mr-2">
      <i class="pi pi-th-large text-indigo-500 text-sm"></i>
    </div>
    <span>Grupos de Permissões e Departamentos</span>
  </div>
  <div class="grid grid-cols-4 gap-4 p-2">
    <div *ngFor="let grupo of grupos" class="flex items-center pb-2">
      <i class="pi pi-check-circle text-teal-500"></i>
      <label class="ml-2">{{grupo.name}}</label>
    </div>
  </div>
</div>
</div>
