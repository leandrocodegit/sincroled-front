<div class="flex flex-col gap-5 w-full p-6 mt-4">

  <!-- Campo Nome -->
  <div class="flex flex-col gap-2">
    <label for="nome" class="text-sm font-semibold text-color">Nome *</label>
    <input pInputText id="nome" type="text" [(ngModel)]="cliente.nome" placeholder="Nome" class="w-full" />
  </div>

  <div *ngIf="!cliente?.id" class="flex flex-col gap-2">
    <label for="host" class="text-sm font-semibold text-color">Dominio *</label>
    <input pInputText id="host" type="text" [(ngModel)]="cliente.host" placeholder="Dominio" class="w-full" />
  </div>

    <div *ngIf="!cliente?.id" class="flex flex-col gap-2">
    <label for="host" class="text-sm font-semibold text-color">Email Administrador *</label>
    <input pInputText id="host" type="text" [(ngModel)]="cliente.email" placeholder="Dominio" class="w-full" />
  </div>

</div>

<div class="pt-4 flex justify-end gap-1 bg-white dark:bg-neutral-900 my-2">
  <p-button [loading]="load" label="Fechar" severity="secondary" outlined="true" styleClass="px-5" [rounded]="true"
    (onClick)="onClose.emit()">
  </p-button>
  <p-button [disabled]="cliente.nome == ''" label="Salvar" severity="primary" styleClass="px-5" (onClick)="salvar()"
    [rounded]="true">
  </p-button>
</div>
