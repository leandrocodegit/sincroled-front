<div class="relative w-full rounded-xl overflow-hidden border border-slate-200 dark:border-[#1e2736]" [style.height]="height">

  <div id="map" class="w-full h-full"></div>

  <!-- Legenda -->
  <div class="absolute bottom-4 left-4 z-[1000] bg-white dark:bg-[#161b27] border border-slate-200 dark:border-[#1e2736] rounded-xl px-4 py-3 shadow-sm">
    <p class="text-[10px] font-bold uppercase tracking-wider text-slate-400 dark:text-slate-500 mb-2">Status</p>
    <div class="flex flex-col gap-1.5">
      <div class="flex items-center gap-2 text-[11px] text-slate-600 dark:text-slate-300">
        <span class="w-3.5 h-3.5 rounded-full border-2 border-emerald-500 bg-emerald-500/20 flex-shrink-0"></span> Ativo
      </div>
      <div class="flex items-center gap-2 text-[11px] text-slate-600 dark:text-slate-300">
        <span class="w-3.5 h-3.5 rounded-full border-2 border-amber-400 bg-amber-400/20 flex-shrink-0"></span> Temporizador
      </div>
      <div class="flex items-center gap-2 text-[11px] text-slate-600 dark:text-slate-300">
        <span class="w-3.5 h-3.5 rounded-full border-2 border-slate-400 bg-slate-400/20 flex-shrink-0"></span> Inativo
      </div>
    </div>
  </div>

  <!-- Painel lateral de dispositivos -->
  <div class="hidden lg:block absolute top-4 right-4 z-[1000] w-52 bg-white dark:bg-[#161b27] border border-slate-200 dark:border-[#1e2736] rounded-xl shadow-sm overflow-hidden">
    <div class="px-4 py-3 border-b border-slate-100 dark:border-[#1e2736]">
      <p class="text-[10px] font-bold uppercase tracking-wider text-slate-400 dark:text-slate-500">Dispositivos</p>
    </div>
    <div class="overflow-y-auto max-h-72">
      <div *ngFor="let device of dispositivos"
           (click)="centralizarDispositivo(device)"
           class="px-4 py-2.5 border-b border-slate-100 dark:border-[#1e2736] cursor-pointer hover:bg-slate-50 dark:hover:bg-[#111622] transition-colors last:border-none">
        <div class="text-xs font-semibold text-slate-800 dark:text-slate-100 truncate uppercase">{{ device.nome }}</div>
        <div class="flex items-center gap-2 mt-1">
          <span [class]="device.operacao?.modoOperacao === 'DESLIGADO'
            ? 'text-slate-400 dark:text-slate-500'
            : 'text-emerald-500'"
            class="text-[10px] font-medium">
            {{ device.operacao?.modoOperacao === 'DESLIGADO' ? '○' : '●' }}
            {{ device.operacao?.modoOperacao || 'FIXO' }}
          </span>
          <div class="flex gap-1 ml-auto">
            <span *ngFor="let cor of device.cor?.parametros?.[0]?.corHexa?.slice(0, 3)"
              class="w-2 h-2 rounded-full"
              [style.background]="cor">
            </span>
          </div>
        </div>
      </div>
    </div>
  </div>

</div>
