<p-button *ngIf="authService.isPermiteEditarCliente()" type="submit" (onClick)="view = true;" [rounded]="true"
  size="small" label="Sincronizar Tudo" pTooltip="Sincronizar" severity="warn" styleClass="mr-label-4" [outlined]="false" tooltipPosition="top">
  <span class="material-symbols-outlined">
    cloud_sync
  </span>
</p-button>
<p-dialog [(visible)]="view" [modal]="true" [draggable]="false" [resizable]="false"
  styleClass="min-w-[99vw] lg:min-w-[80vw] p-2" [dismissableMask]="true">

  <div class="lg:p-3 w-full">

    <div class="flex gap-6">

      <div class="col-12 lg:col-6 xl:col-7 w-full">
        <p-card styleClass="shadow-2 h-full">
          <p-table [value]="logs()" [rows]="12" [paginator]="true" responsiveLayout="scroll" selectionMode="single"
            styleClass="p-datatable-sm p-datatable-striped w-full">

            <ng-template pTemplate="header">
              <tr>
                <th style="width: 15%">Horário</th>
                <th style="width: 15%">Status</th>
                <th style="width: 70%">Resposta</th>
              </tr>
            </ng-template>

                        <ng-template pTemplate="body" let-log>
              <tr [className]="logSelecionado() === log ? 'bg-primary-reverse font-bold text-primary' : ''"
                (click)="selecionarLog(log)" style="cursor: pointer;">
                <td class="white-space-nowrap">{{ log.timestamp | date:'HH:mm:ss.SSS' }}</td>
                <td>
                  <p-tag [severity]="log.status === 'SUCESSO' || log.status === 'OK' ? 'success' : 'danger'"
                    [value]="log.status">
                  </p-tag>
                </td>
                <td>
                  <span class="text-xs font-mono block white-space-nowrap overflow-hidden text-overflow-ellipsis">
                    {{ log.mensagem }}
                  </span>
                </td>
              </tr>
            </ng-template>

            <ng-template pTemplate="emptymessage">
              <tr>
                <td colspan="3" class="text-center p-5 text-muted shadow-none">
                  <i class="pi pi-spin pi-spinner mr-2"></i> Aguardando pacotes do dispositivo
                </td>
              </tr>
            </ng-template>
          </p-table>
        </p-card>
      </div>
    </div>

    <button [disabled]="carregando()" (click)="iniciarMonitoramento()" class="w-full py-4 px-6 rounded-xl font-bold text-sm uppercase tracking-widest transition-all duration-200
             bg-emerald-500 hover:bg-emerald-400 active:scale-[0.98] text-zinc-950
             disabled:bg-zinc-800 disabled:text-zinc-500 disabled:cursor-not-allowed disabled:scale-100
             focus:outline-none focus:ring-2 focus:ring-emerald-500 focus:ring-offset-2 focus:ring-offset-zinc-950">
      <span *ngIf="!carregando()">Sincronizar Tudo</span>
      <span *ngIf="carregando()" class="flex items-center justify-center gap-3">
        <svg class="animate-spin h-4 w-4 text-zinc-400" xmlns="http://www.w3.org/2000/svg" fill="none"
          viewBox="0 0 24 24">
          <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
          <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"></path>
        </svg>
        <span *ngIf="statusAtual() !== 'OK'">Aguardando confirmação do device…</span>
        <span *ngIf="statusAtual() === 'OK'">Device recebeu — aguardando processamento…</span>
      </span>
    </button>
  </div>
</p-dialog>
